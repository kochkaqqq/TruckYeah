services:
  frontend:
    build:
      context: ./frontend
      dockerfile: dockerfile
    container_name: truckyeah-frontend
    ports:
      - "3000:80"
    depends_on:
      - identity-service
      - listing-service
      - chat-service
    networks:
      - truckyeah
    restart: unless-stopped

  identity-service:
    build:
      context: ./Services/IdentityService
      dockerfile: dockerfile
    container_name: truckyeah-identity-service
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=identity-db;Port=5432;Database=truckyeah_identity;Username=postgres;Password=postgres;Include Error Detail=true
    ports:
      - "5001:8080"
    depends_on:
      identity-db:
        condition: service_healthy
    networks:
      - truckyeah
    restart: unless-stopped

  listing-service:
    build:
      context: ./Services/ListingService
      dockerfile: Dockerfile
    container_name: truckyeah-listing-service
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__ListingServiceDbContext: Host=listing-db;Port=5432;Database=truckyeah_listing;Username=postgres;Password=postgres123
    ports:
      - "5002:8080"
    depends_on:
      listing-db:
        condition: service_healthy
    networks:
      - truckyeah
    restart: unless-stopped

  chat-service:
    build:
      context: ./Services/ChatService
      dockerfile: Dockerfile
    container_name: truckyeah-chat-service
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__ChatServiceDbContext: Host=chat-db;Port=5432;Database=truckyeah_chat;Username=postgres;Password=postgres123
    ports:
      - "5003:8080"
    depends_on:
      chat-db:
        condition: service_healthy
    networks:
      - truckyeah
    restart: unless-stopped

  identity-db:
    image: postgres:16-alpine
    container_name: truckyeah-identity-db
    environment:
      POSTGRES_DB: truckyeah_identity
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - identity-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d truckyeah_identity"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - truckyeah
    restart: unless-stopped

  listing-db:
    image: postgres:16-alpine
    container_name: truckyeah-listing-db
    environment:
      POSTGRES_DB: truckyeah_listing
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5434:5432"
    volumes:
      - listing-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d truckyeah_listing"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - truckyeah
    restart: unless-stopped

  chat-db:
    image: postgres:16-alpine
    container_name: truckyeah-chat-db
    environment:
      POSTGRES_DB: truckyeah_chat
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5435:5432"
    volumes:
      - chat-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d truckyeah_chat"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - truckyeah
    restart: unless-stopped

networks:
  truckyeah:
    driver: bridge

volumes:
  identity-db-data:
  listing-db-data:
  chat-db-data:
