services:
  frontend:
    build:
      context: ./frontend
      dockerfile: dockerfile
    container_name: truckyeah-frontend
    ports:
      - "3000:80"
    depends_on:
      identity-service:
        condition: service_healthy
      listing-service:
        condition: service_healthy
      chat-service:
        condition: service_healthy
      route-service:
        condition: service_healthy
      moderator-service:
        condition: service_healthy
    networks:
      - truckyeah
    restart: unless-stopped

  identity-service:
    build:
      context: ./Services/IdentityService
      dockerfile: dockerfile
    container_name: truckyeah-identity-service
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Host=identity-db;Port=5432;Database=truckyeah_identity;Username=postgres;Password=${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      Jwt__Issuer: identity-service
      Jwt__Key: ${JWT_KEY:?Set JWT_KEY in .env}
      Moderator__Email: ${MODERATOR_EMAIL:-moderator@truckyeah.local}
      Moderator__Password: ${MODERATOR_PASSWORD:-ChangeMe123!}
      Moderator__Phone: ${MODERATOR_PHONE:-+79990000000}
      Moderator__Postcode: ${MODERATOR_POSTCODE:-000000}
    ports:
      - "5001:8080"
    depends_on:
      identity-db:
        condition: service_healthy
    networks:
      - truckyeah
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  listing-service:
    build:
      context: ./Services/ListingService
      dockerfile: Dockerfile
    container_name: truckyeah-listing-service
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__ListingServiceDbContext: Host=listing-db;Port=5432;Database=truckyeah_listing;Username=postgres;Password=${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      Jwt__Issuer: identity-service
      Jwt__Key: ${JWT_KEY:?Set JWT_KEY in .env}
    ports:
      - "5002:8080"
    depends_on:
      listing-db:
        condition: service_healthy
    networks:
      - truckyeah
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  chat-service:
    build:
      context: ./Services/ChatService
      dockerfile: Dockerfile
    container_name: truckyeah-chat-service
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__ChatServiceDbContext: Host=chat-db;Port=5432;Database=truckyeah_chat;Username=postgres;Password=${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      Jwt__Issuer: identity-service
      Jwt__Key: ${JWT_KEY:?Set JWT_KEY in .env}
    ports:
      - "5003:8080"
    depends_on:
      chat-db:
        condition: service_healthy
    networks:
      - truckyeah
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  route-service:
    build:
      context: ./Services/RouteService
      dockerfile: Dockerfile
    container_name: truckyeah-route-service
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__RouteServiceDbContext: Host=route-db;Port=5432;Database=truckyeah_route;Username=postgres;Password=${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      OpenRouteService__ApiKey: ${OPENROUTESERVICE_API_KEY:?Set OPENROUTESERVICE_API_KEY in .env}
    ports:
      - "5004:8080"
    depends_on:
      route-db:
        condition: service_healthy
    networks:
      - truckyeah
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  moderator-service:
    build:
      context: ./Services/ModeratorService
      dockerfile: Dockerfile
    container_name: truckyeah-moderator-service
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Jwt__Issuer: identity-service
      Jwt__Key: ${JWT_KEY:?Set JWT_KEY in .env}
      Services__Identity: http://identity-service:8080/
      Services__Listing: http://listing-service:8080/
    ports:
      - "5005:8080"
    depends_on:
      identity-service:
        condition: service_healthy
      listing-service:
        condition: service_healthy
    networks:
      - truckyeah
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  identity-db:
    image: postgres:16-alpine
    container_name: truckyeah-identity-db
    environment:
      POSTGRES_DB: truckyeah_identity
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    ports:
      - "5433:5432"
    volumes:
      - identity-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "PGPASSWORD=\"$${POSTGRES_PASSWORD}\" psql -U postgres -d truckyeah_identity -tAc 'select 1' >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - truckyeah
    restart: unless-stopped

  listing-db:
    image: postgres:16-alpine
    container_name: truckyeah-listing-db
    environment:
      POSTGRES_DB: truckyeah_listing
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    ports:
      - "5434:5432"
    volumes:
      - listing-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "PGPASSWORD=\"$${POSTGRES_PASSWORD}\" psql -U postgres -d truckyeah_listing -tAc 'select 1' >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - truckyeah
    restart: unless-stopped

  chat-db:
    image: postgres:16-alpine
    container_name: truckyeah-chat-db
    environment:
      POSTGRES_DB: truckyeah_chat
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    ports:
      - "5435:5432"
    volumes:
      - chat-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "PGPASSWORD=\"$${POSTGRES_PASSWORD}\" psql -U postgres -d truckyeah_chat -tAc 'select 1' >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - truckyeah
    restart: unless-stopped

  route-db:
    image: postgres:16-alpine
    container_name: truckyeah-route-db
    environment:
      POSTGRES_DB: truckyeah_route
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    ports:
      - "5436:5432"
    volumes:
      - route-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "PGPASSWORD=\"$${POSTGRES_PASSWORD}\" psql -U postgres -d truckyeah_route -tAc 'select 1' >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - truckyeah
    restart: unless-stopped

networks:
  truckyeah:
    driver: bridge

volumes:
  identity-db-data:
  listing-db-data:
  chat-db-data:
  route-db-data:
